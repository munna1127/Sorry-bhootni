<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Bhootni 😂</title>

<style>
body {
  background: linear-gradient(135deg, #ff4e50, #fc913a);
  text-align: center;
  font-family: Arial;
  color: white;
}

h1 {
  margin-top: 50px;
  font-size: 40px;
}

button {
  padding: 15px 30px;
  font-size: 18px;
  margin: 20px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#yes {
  background: green;
  color: white;
}

#no {
  background: red;
  color: white;
  position: absolute;
}

.game-box {
  margin-top: 50px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<h1>Sorry Bhootni 😭💔</h1>

<p>Mujhe maaf kar de na 🥺</p>

<button id="yes">YES ❤️</button>
<button id="no">NO 😡</button>

<audio id="sound1" src="https://www.myinstants.com/media/sounds/troll.mp3"></audio>
<audio id="sound2" src="https://www.myinstants.com/media/sounds/sad-violin.mp3"></audio>

<div id="gameSection" class="hidden">
  <h2>Mini Game 🎮</h2>
  <p>Click the box!</p>
  <button onclick="scoreGame()">Click Me</button>
  <p id="score">Score: 0</p>
</div>

<script>
let score = 0;

// YES button
document.getElementById("yes").onclick = function() {
  document.getElementById("sound1").play();
  alert("Awww ❤️ I love you 😂");
  document.getElementById("gameSection").classList.remove("hidden");
};

// NO button bhaagega 😆
document.getElementById("no").onmouseover = function() {
  let x = Math.random() * window.innerWidth;
  let y = Math.random() * window.innerHeight;

  this.style.left = x + "px";
  this.style.top = y + "px";
};

// Game function
function scoreGame() {
  score++;
  document.getElementById("score").innerText = "Score: " + score;

  if(score == 5){
    alert("Pro Player 🔥");
  }
}

// Sad sound on load
window.onload = function() {
  document.getElementById("sound2").play();
};
</script>

</body>
</html>
