<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Sorry Cinematic 💔</title>
<style>
body{margin:0;font-family:sans-serif;background:#000;color:#fff;overflow:hidden}
.slide{position:absolute;width:100%;height:100%;display:flex;justify-content:center;align-items:center;flex-direction:column;opacity:0;transition:1s}
.active{opacity:1}
h1{color:#ff4d6d}
button{padding:12px 20px;border:none;border-radius:25px;background:#ff4d6d;color:#fff;margin-top:20px;cursor:pointer}
.progress{position:absolute;top:0;left:0;height:5px;background:#ff4d6d;width:0%}
</style>
</head>
<body><div class="progress" id="bar"></div><div class="slide active" id="s1">
<h1>Meri Bhootni 👻❤️</h1>
<p>Ek story jo sirf tere liye hai...</p>
</div><div class="slide" id="s2">
<p>Ek ladka tha... thoda sa stupid 😔</p>
</div><div class="slide" id="s3">
<p>Usne apni sabse special dost ko hurt kar diya 💔</p>
</div><div class="slide" id="s4">
<p>Usse tab samajh aaya... tu kitni important hai ❤️</p>
</div><div class="slide" id="s5">
<p>Usne socha... kaise manaun usko 😣</p>
</div><div class="slide" id="s6">
<p>Isliye ye choti si website banayi...</p>
</div><div class="slide" id="s7">
<h1>Please maaf kar de 😭</h1>
<button onclick="accept()">Theek hai 😊</button>
</div><audio id="bgm" src="https://www2.cs.uic.edu/~i101/SoundFiles/StarWars60.wav" loop></audio> <audio id="click" src="https://www2.cs.uic.edu/~i101/SoundFiles/taunt.wav"></audio>

<script>
let current=1;
let total=7;
let bar=document.getElementById("bar");

function showSlide(n){
 document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));
 document.getElementById('s'+n).classList.add('active');
 bar.style.width=((n/total)*100)+'%';
}

setInterval(()=>{
 if(current<total){
  current++;
  showSlide(current);
 }
},3000);

// parallax hearts
setInterval(()=>{
 let h=document.createElement('div');
 h.innerText='❤️';
 h.style.position='absolute';
 h.style.left=Math.random()*100+'vw';
 h.style.top='100vh';
 h.style.fontSize=(Math.random()*20+15)+'px';
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),4000);
},300);

// background music autoplay fix
window.onclick=()=>{
 document.getElementById('bgm').play();
}

function accept(){
 document.getElementById('click').play();
 document.body.innerHTML=`
 <div style="display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;background:black;color:white">
 <div>
 <h1 style="color:#ff4d6d">Thank You 😭❤️</h1>
 <p>Tu meri duniya hai... gussa mat reh please 🥺</p>
 <p>Forever best friend 💯</p>
 </div>
 </div>`;
}
</script></body>
</html>
