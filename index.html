<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTIMATE SORRY GAME 💀❤️</title>
<style>
body{margin:0;font-family:sans-serif;background:#000;color:#fff;overflow:hidden}
.screen{display:none;justify-content:center;align-items:center;height:100vh;flex-direction:column;text-align:center}
.active{display:flex}
button{padding:12px 20px;border:none;border-radius:25px;margin:10px;background:#ff4d6d;color:#fff;cursor:pointer}
h1{color:#ff4d6d}
#noBtn{position:absolute}
</style>
</head>
<body><!-- SCREEN 1 --><div class="screen active" id="s1">
<h1>Meri Bhootni 👻❤️</h1>
<p>Ready ho ek journey ke liye? 😏</p>
<button onclick="next(1)">Start</button>
</div><!-- STORY --><div class="screen" id="s2">
<p>Ek ladka tha... thoda stupid 😔</p>
<button onclick="next(2)">Next</button>
</div><div class="screen" id="s3">
<p>Usne apni sabse khas dost ko hurt kar diya 💔</p>
<button onclick="next(3)">Next</button>
</div><!-- GAME 1 CLICK --><div class="screen" id="g1">
<h1>Game 1 🎮</h1>
<p>3 baar click karo “Sorry”</p>
<button onclick="clickGame()">Sorry 😭</button>
<p id="score"></p>
</div><!-- GAME 2 CATCH HEART --><div class="screen" id="g2">
<h1>Game 2 ❤️</h1>
<p>Heart pakdo!</p>
<div id="heart" onclick="catchHeart()" style="position:absolute;font-size:30px;">❤️</div>
<p id="score2"></p>
</div><!-- YES NO --><div class="screen" id="s4">
<h1>Ab bata 😭</h1>
<button onclick="win()">Theek hai 😊</button>
<button id="noBtn" onmouseover="moveNo()">Nahi 😒</button>
</div><!-- FINAL --><div class="screen" id="final">
<h1>YAYYY 😭❤️</h1>
<p>Tu maan gayi 🥺</p>
<p>Best friend forever 💯</p>
</div><audio id="bg" src="https://www2.cs.uic.edu/~i101/SoundFiles/StarWars60.wav" loop></audio> <audio id="click" src="https://www2.cs.uic.edu/~i101/SoundFiles/taunt.wav"></audio>

<script>

function next(n){
 document.getElementById('s'+n).classList.remove('active');
 if(n==3){
  document.getElementById('g1').classList.add('active');
 }else{
  document.getElementById('s'+(n+1)).classList.add('active');
 }
}

// GAME 1
let c=0;
function clickGame(){
 c++;
 document.getElementById('click').play();
 document.getElementById('score').innerText="Clicks: "+c;
 if(c>=3){
  document.getElementById('g1').classList.remove('active');
  document.getElementById('g2').classList.add('active');
 }
}

// GAME 2
let c2=0;
function catchHeart(){
 c2++;
 document.getElementById('click').play();
 document.getElementById('score2').innerText="Caught: "+c2;
 moveHeart();
 if(c2>=5){
  document.getElementById('g2').classList.remove('active');
  document.getElementById('s4').classList.add('active');
 }
}

function moveHeart(){
 let h=document.getElementById('heart');
 h.style.left=Math.random()*80+'vw';
 h.style.top=Math.random()*80+'vh';
}

// NO BUTTON RUN
function moveNo(){
 let b=document.getElementById('noBtn');
 b.style.left=Math.random()*300+'px';
 b.style.top=Math.random()*300+'px';
}

// WIN
function win(){
 document.getElementById('click').play();
 document.getElementById('s4').classList.remove('active');
 document.getElementById('final').classList.add('active');
}

// AUTO HEARTS
setInterval(()=>{
 let h=document.createElement('div');
 h.innerText='❤️';
 h.style.position='absolute';
 h.style.left=Math.random()*100+'vw';
 h.style.top='100vh';
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),4000);
},300);

// MUSIC START
window.onclick=()=>{
 document.getElementById('bg').play();
}

</script></body>
</html>
